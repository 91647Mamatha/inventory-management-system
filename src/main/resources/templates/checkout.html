<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg">
                <div class="card-header text-center bg-primary text-white">
                    <h4>Checkout</h4>
                </div>

                <div class="card-body">
                    <form th:action="@{/checkout/place}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="customerName" class="form-control"
                                   placeholder="Enter your full name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phone" class="form-control"
                                   placeholder="Enter phone number" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Delivery Address</label>
                            <textarea name="address" class="form-control" rows="3"
                                      placeholder="Enter delivery address" required></textarea>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-success btn-lg">Place Order</button>
                        </div>

                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="/cart" class="btn btn-outline-secondary">Back to Cart</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
