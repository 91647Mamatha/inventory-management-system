<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smart Inventory Store</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products">Smart Inventory Store</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">

            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">Cart</a></li>
                <li class="nav-item"><a class="nav-link" href="/my-orders">My Orders</a></li>

                <li class="nav-item">
                    <a class="btn btn-outline-light ms-2" href="/logout">Logout</a>
                </li>
            </ul>

        </div>
    </div>
</nav>
<!-- END NAVBAR -->

<div class="container py-4">
    <h2 class="mb-4 fw-bold text-center">Available Products</h2>

    <div class="row g-4">

        <!-- LOOP PRODUCTS -->
        <div class="col-md-4" th:each="p : ${products}">
            <div class="card shadow-sm border-0">

                <!-- Product Image -->
                <img th:src="@{/images/{img}(img=${p.imageName})}"
                     class="card-img-top"
                     style="height: 220px; object-fit: cover;border-radius: 10px 10px 0 0;">

                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${p.productName}"></h5>

                    <p class="text-muted mb-1">
                        Category: <span th:text="${p.category}"></span>
                    </p>

                    <p class="fw-bold text-primary mb-1">
                        Price: ₹<span th:text="${p.price}"></span>
                    </p>

                    <p class="text-success mb-3">Stock: <span th:text="${p.quantity}"></span></p>

                    <a class="btn btn-primary w-100"
                       th:href="@{/cart/add/{id}(id=${p.productId})}">
                        Add to Cart
                    </a>
                </div>

            </div>
        </div>
        <!-- END LOOP -->

    </div>
</div>

<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
