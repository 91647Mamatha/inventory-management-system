<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Order Management</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('/images/login-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .login-container {
            width: 380px;
            margin: 80px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.90);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #444;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #aaa;
            border-radius: 6px;
            font-size: 15px;
        }

        .btn {
            width: 100%;
            background: #0066ff;
            border: none;
            padding: 12px;
            font-size: 16px;
            margin-top: 15px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn:hover {
            background: #004bd1;
        }

        .error-msg {
            color: red;
            text-align: center;
            margin-bottom: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <div th:if="${param.error}" class="error-msg">Invalid username or password</div>
    <div th:if="${param.logout}" class="error-msg">Logged out successfully</div>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required />
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required />
        </div>

        <button class="btn" type="submit">Login</button>
    </form>
</div>

</body>
</html>
